<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #202026;
    --border: #2a2a32;
    --accent: #c8a97e;
    --accent-dim: rgba(200,169,126,0.12);
    --text: #e8e6e1;
    --text-muted: #7a7870;
    --text-dim: #4a4844;
    --red: #c47a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .nav-right { display: flex; align-items: center; gap: 8px; }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active { color: var(--accent); background: var(--accent-dim); }

  .view { display: none; flex: 1; }
  .view.active { display: flex; flex-direction: column; }

  /* ── WRITE ── */
  #write-view {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 32px 60px;
  }

  .date-line {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  /* PROMPT */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px 14px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .prompt-left { flex: 1; min-width: 0; }

  .prompt-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 5px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .prompt-text {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.5;
    transition: opacity 0.2s;
  }

  .prompt-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .prompt-skip-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .prompt-skip-btn:hover { border-color: var(--text-muted); color: var(--text-muted); }

  .prompt-hide-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.18s;
  }
  .prompt-hide-btn:hover { color: var(--text-muted); }

  /* TITLE INPUT */
  .title-wrap {
    margin-bottom: 6px;
  }

  .title-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 600;
    line-height: 1.3;
    caret-color: var(--accent);
    padding: 0;
  }
  .title-input::placeholder {
    color: var(--text-dim);
    font-weight: 400;
    font-style: italic;
  }

  .title-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 18px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .title-divider.visible { opacity: 1; }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    line-height: 1.85;
    resize: none;
    min-height: 300px;
    caret-color: var(--accent);
  }
  textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .editor-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .word-count { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.04em; }

  .save-btn {
    background: var(--accent); color: #0f0f11; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 10px 24px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .save-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }

  .save-feedback {
    font-size: 0.78rem; color: var(--accent); opacity: 0;
    transition: opacity 0.3s; letter-spacing: 0.04em;
  }
  .save-feedback.show { opacity: 1; }

  /* ── ARCHIVE ── */
  #archive-view {
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 32px 60px;
  }

  .archive-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 40px;
  }

  .archive-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
  .entry-count { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.06em; }

  /* CALENDAR */
  .cal-block { margin-bottom: 52px; }

  .cal-month-title {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .cal-wd {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-cell {
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 8px 9px 7px;
    min-height: 68px;
    border: 1px solid transparent;
    transition: all 0.18s;
  }

  .cal-cell.empty {
    background: transparent !important;
    border-color: transparent !important;
    pointer-events: none;
  }

  .cal-cell.no-entry {
    background: var(--surface);
    opacity: 0.3;
  }

  .cal-cell.has-entry {
    cursor: pointer;
    background: var(--surface);
    border-color: var(--border);
    opacity: 1;
  }
  .cal-cell.has-entry:hover {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  }

  .cal-cell.is-today {
    border-color: var(--accent) !important;
    opacity: 1 !important;
  }

  .cal-cell-wd {
    font-size: 0.54rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 4px;
  }
  .cal-cell.has-entry .cal-cell-wd { color: var(--text-muted); }
  .cal-cell.is-today .cal-cell-wd  { color: var(--accent); opacity: 0.7; }

  .cal-cell-num {
    font-size: 1.05rem;
    line-height: 1;
    color: var(--text-dim);
  }
  .cal-cell.has-entry .cal-cell-num {
    color: var(--text);
    font-family: 'Playfair Display', serif;
  }
  .cal-cell.is-today .cal-cell-num { color: var(--accent); }

  .cal-cell-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: auto;
    opacity: 0.75;
  }

  .empty-state { text-align: center; padding: 80px 0; color: var(--text-dim); }
  .empty-state p { font-size: 0.88rem; margin-top: 8px; font-style: italic; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,12,0.85);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 680px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 32px 36px;
    animation: slideUp 0.25s ease;
  }

  .modal-date {
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 12px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 20px;
  }

  .modal-title-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 20px;
  }

  .modal-body {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem; line-height: 1.85;
    color: var(--text); white-space: pre-wrap;
  }

  .modal-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
  }

  .modal-words { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.04em; }
  .modal-actions { display: flex; gap: 8px; }

  .close-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.04em;
  }
  .close-btn:hover { border-color: var(--text-muted); color: var(--text); }

  .delete-btn {
    background: none; border: 1px solid transparent; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.04em;
  }
  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes promptSwap {
    0%   { opacity: 1; transform: translateX(0); }
    40%  { opacity: 0; transform: translateX(-10px); }
    60%  { opacity: 0; transform: translateX(10px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  .prompt-animating { animation: promptSwap 0.4s ease; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    #write-view, #archive-view { padding: 28px 16px 48px; }
    nav { padding: 16px 20px; }
    .modal { padding: 24px 20px; }
    .cal-cell { min-height: 50px; padding: 5px 5px 4px; }
    .cal-cell-num { font-size: 0.82rem; }
    .cal-cell-wd { font-size: 0.44rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Diario</div>
  <div class="nav-right">
    <button class="tab-btn active" onclick="showView('write')">Scrivi</button>
    <button class="tab-btn" onclick="showView('archive')">Archivio</button>
  </div>
</nav>

<!-- WRITE -->
<div id="write-view" class="view active">
  <div class="date-line" id="today-label"></div>

  <div class="prompt-card" id="prompt-card">
    <div class="prompt-left">
      <span class="prompt-label">Spunto</span>
      <span class="prompt-text" id="prompt-text"></span>
    </div>
    <div class="prompt-actions">
      <button class="prompt-skip-btn" onclick="skipPrompt()" title="Prossimo spunto">Altro &#x2192;</button>
      <button class="prompt-hide-btn" onclick="hidePrompt()" title="Nascondi">&#x2715;</button>
    </div>
  </div>

  <div class="title-wrap">
    <input type="text" id="title-input" class="title-input" placeholder="Titolo (opzionale)&#8230;" maxlength="120" autocomplete="off" />
  </div>
  <div class="title-divider" id="title-divider"></div>

  <textarea id="editor" placeholder="Inizia a scrivere&#8230;"></textarea>

  <div class="editor-footer">
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="word-count" id="word-count">0 parole</span>
      <span class="save-feedback" id="save-feedback">Salvato &#x2713;</span>
    </div>
    <button class="save-btn" onclick="saveEntry()">Salva</button>
  </div>
</div>

<!-- ARCHIVE -->
<div id="archive-view" class="view">
  <div class="archive-header">
    <span class="archive-title">Archivio</span>
    <span class="entry-count" id="entry-count"></span>
  </div>
  <div id="calendar-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-title" id="modal-title" style="display:none"></div>
    <div class="modal-title-divider" id="modal-title-divider" style="display:none"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <span class="modal-words" id="modal-words"></span>
      <div class="modal-actions">
        <button class="delete-btn" onclick="deleteEntry()">Elimina</button>
        <button class="close-btn" onclick="closeModalDirect()">Chiudi</button>
      </div>
    </div>
  </div>
</div>

<script>
const PROMPTS = [
  "Com'è andata oggi? C'è un momento specifico che ti è rimasto?",
  "Cos'hai sentito oggi che non ti aspettavi?",
  "C'è qualcosa che avresti voluto fare diversamente oggi?",
  "Qual è stata la parte più difficile della giornata?",
  "Cosa ti ha dato energia oggi? Cosa te l'ha tolta?",
  "C'è stata una conversazione oggi che ti ha lasciato qualcosa?",
  "Descrivi il tuo stato d'animo di oggi come se fosse il tempo fuori.",
  "Di cosa sei grato/a oggi, anche per una piccola cosa?",
  "Hai rimandato qualcosa oggi? Perché?",
  "C'è un pensiero che ti gira in testa da stamattina?",
  "Ti sei sentito/a te stesso/a oggi?",
  "Cosa ti ha sorpreso oggi, in bene o in male?",
  "C'è qualcosa che hai visto, letto o sentito oggi che ti ha colpito?",
  "Come stai, davvero, adesso che la giornata è quasi finita?",
  "C'è qualcosa che non hai detto oggi che avresti voluto dire?",
  "Cosa ricorderai di oggi tra un mese?",
  "Ti sei preso/a cura di te oggi? In che modo?",
  "C'è qualcosa che hai capito meglio di te stesso/a oggi?",
  "Qual è stata la decisione più piccola che hai preso oggi?",
  "Se oggi fosse un colore, quale sarebbe? Perché?",
  "Cosa ti pesa ancora mentre scrivi queste parole?",
  "C'è qualcosa che hai rimandato a domani che potevi fare oggi?",
  "Ti sei sentito/a connesso/a agli altri oggi, o isolato/a?",
  "C'è un momento di oggi in cui hai sorriso davvero?",
  "Cosa hai imparato oggi, anche qualcosa di banale?",
];

// Prompt index state — persists in sessionStorage so si resetta ogni volta che riapri
function getPromptIdx() {
  const v = sessionStorage.getItem('diario_prompt_idx');
  if (v !== null) return parseInt(v, 10);
  // Start from a seed based on today's date for variety
  const seed = Math.floor(Date.now() / 86400000) % PROMPTS.length;
  return seed;
}

function setPromptIdx(i) {
  sessionStorage.setItem('diario_prompt_idx', i);
}

let currentPromptIdx = getPromptIdx();

function getCurrentPrompt() {
  return PROMPTS[currentPromptIdx % PROMPTS.length];
}

function skipPrompt() {
  currentPromptIdx = (currentPromptIdx + 1) % PROMPTS.length;
  setPromptIdx(currentPromptIdx);
  const el = document.getElementById('prompt-text');
  el.classList.remove('prompt-animating');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('prompt-animating');
  el.textContent = getCurrentPrompt();
  setTimeout(function() { el.classList.remove('prompt-animating'); }, 400);
}

function hidePrompt() {
  const card = document.getElementById('prompt-card');
  card.style.transition = 'opacity 0.22s ease, transform 0.22s ease, margin-bottom 0.22s ease, padding 0.22s ease, max-height 0.22s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(-4px)';
  card.style.maxHeight = '0';
  card.style.marginBottom = '0';
  card.style.padding = '0';
  card.style.overflow = 'hidden';
  setTimeout(function() { card.style.display = 'none'; }, 230);
}

function getDayKey(date) {
  const d = date || new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(key) {
  const parts = key.split('-');
  const date = new Date(+parts[0], +parts[1]-1, +parts[2]);
  return date.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function getEntries() {
  try { return JSON.parse(localStorage.getItem('diario_entries') || '{}'); } catch { return {}; }
}

function saveEntries(entries) {
  localStorage.setItem('diario_entries', JSON.stringify(entries));
}

// ── Init ──
const todayKey = getDayKey();
document.getElementById('today-label').textContent = formatDateDisplay(todayKey);
document.getElementById('prompt-text').textContent = getCurrentPrompt();

const _init = getEntries();
if (_init[todayKey]) {
  document.getElementById('editor').value = _init[todayKey].text || '';
  document.getElementById('title-input').value = _init[todayKey].title || '';
  updateWordCount();
  updateTitleDivider();
}

// ── Title divider visibility ──
function updateTitleDivider() {
  const val = document.getElementById('title-input').value.trim();
  const divider = document.getElementById('title-divider');
  if (val) divider.classList.add('visible');
  else divider.classList.remove('visible');
}

document.getElementById('title-input').addEventListener('input', function() {
  updateTitleDivider();
  triggerAutosave();
});

// ── Word count ──
function updateWordCount() {
  const text = document.getElementById('editor').value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('word-count').textContent = words + (words === 1 ? ' parola' : ' parole');
}

document.getElementById('editor').addEventListener('input', function() {
  updateWordCount();
  triggerAutosave();
});

// ── Autosave ──
let autosaveTimer;
function triggerAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(function() {
    const text = document.getElementById('editor').value;
    const title = document.getElementById('title-input').value;
    if (text.trim()) {
      const all = getEntries();
      all[todayKey] = { text: text, title: title.trim(), savedAt: new Date().toISOString() };
      saveEntries(all);
      showFeedback();
    }
  }, 1500);
}

function showFeedback() {
  const el = document.getElementById('save-feedback');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function saveEntry() {
  const text = document.getElementById('editor').value;
  const title = document.getElementById('title-input').value;
  if (!text.trim()) return;
  const all = getEntries();
  all[todayKey] = { text: text, title: title.trim(), savedAt: new Date().toISOString() };
  saveEntries(all);
  showFeedback();
}

// ── Views ──
function showView(v) {
  document.querySelectorAll('.view').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById(v + '-view').classList.add('active');
  document.querySelectorAll('.tab-btn')[v === 'write' ? 0 : 1].classList.add('active');
  if (v === 'archive') renderArchive();
}

// ── Calendar ──
const GIORNI_BREVI = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const GIORNI_FULL  = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
               'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function renderArchive() {
  const all = getEntries();
  const keys = Object.keys(all).sort(function(a,b){ return b.localeCompare(a); });
  const container = document.getElementById('calendar-container');
  const n = keys.length;

  document.getElementById('entry-count').textContent = n
    ? n + (n === 1 ? ' voce' : ' voci') : '';

  if (!n) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:2rem">&#x2736;</div><p>Nessuna voce ancora.<br>Inizia a scrivere oggi.</p></div>';
    return;
  }

  const entrySet = new Set(keys);

  const earliest = keys[keys.length - 1].substring(0,7);
  const nowYM    = todayKey.substring(0,7);

  const ymList = [];
  const epArr = earliest.split('-').map(Number);
  let cy = epArr[0], cm = epArr[1];
  const nowArr = nowYM.split('-').map(Number);
  const ey = nowArr[0], em = nowArr[1];

  while (cy < ey || (cy === ey && cm <= em)) {
    ymList.push(cy + '-' + String(cm).padStart(2,'0'));
    cm++;
    if (cm > 12) { cm = 1; cy++; }
  }
  ymList.reverse();

  let html = '';

  ymList.forEach(function(ym) {
    const ymParts = ym.split('-').map(Number);
    const y = ymParts[0], m = ymParts[1];
    const firstDay    = new Date(y, m-1, 1);
    const daysInMonth = new Date(y, m, 0).getDate();

    let startOffset = firstDay.getDay() - 1;
    if (startOffset < 0) startOffset = 6;

    let cells = '';
    for (let i = 0; i < startOffset; i++) {
      cells += '<div class="cal-cell empty"></div>';
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj  = new Date(y, m-1, d);
      const key      = getDayKey(dateObj);
      const dowIdx   = (dateObj.getDay() + 6) % 7;
      const dowLabel = GIORNI_FULL[dowIdx];
      const isToday  = key === todayKey;
      const hasEntry = entrySet.has(key);

      let cls = 'cal-cell ' + (hasEntry ? 'has-entry' : 'no-entry');
      if (isToday) cls += ' is-today';

      const onclick = hasEntry ? ' onclick="openEntry(\'' + key + '\')"' : '';

      cells += '<div class="' + cls + '"' + onclick + '>' +
        '<span class="cal-cell-wd">' + dowLabel + '</span>' +
        '<span class="cal-cell-num">' + d + '</span>' +
        (hasEntry ? '<span class="cal-cell-dot"></span>' : '') +
        '</div>';
    }

    const wdHeaders = GIORNI_BREVI.map(function(g){ return '<div class="cal-wd">' + g + '</div>'; }).join('');

    html += '<div class="cal-block">' +
      '<div class="cal-month-title">' + MESI[m-1] + ' ' + y + '</div>' +
      '<div class="cal-weekdays">' + wdHeaders + '</div>' +
      '<div class="cal-grid">' + cells + '</div>' +
      '</div>';
  });

  container.innerHTML = html;
}

// ── Modal ──
let currentModalKey = null;

function openEntry(key) {
  const all = getEntries();
  const entry = all[key];
  if (!entry) return;
  currentModalKey = key;

  document.getElementById('modal-date').textContent = formatDateDisplay(key);

  const titleEl   = document.getElementById('modal-title');
  const dividerEl = document.getElementById('modal-title-divider');

  if (entry.title) {
    titleEl.textContent = entry.title;
    titleEl.style.display = 'block';
    dividerEl.style.display = 'block';
  } else {
    titleEl.style.display = 'none';
    dividerEl.style.display = 'none';
  }

  document.getElementById('modal-body').textContent = entry.text;
  const words = entry.text.trim().split(/\s+/).length;
  document.getElementById('modal-words').textContent = words + ' parole';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModalKey = null;
}

function deleteEntry() {
  if (!currentModalKey) return;
  if (!confirm("Eliminare questa voce? L'azione è irreversibile.")) return;
  const all = getEntries();
  delete all[currentModalKey];
  saveEntries(all);
  closeModalDirect();
  renderArchive();
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveEntry(); }
  if (e.key === 'Escape') closeModalDirect();
});
</script>
